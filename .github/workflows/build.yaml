name: Build Keksposé
on:
  push:
    branches:
      - 'main'
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Run tests
        run: go test -v ./...
      - name: Build release archives
        env:
          PLATFORMS: "darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64 windows/arm64"
          VERSION: ${{github.ref_name}}
        run: bash ./hack/package-release.sh "$VERSION"
      - name: Generate Homebrew formulas
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{github.ref_name}}
        run: |
          VERSION_NO_V="${VERSION#v}"
          bash ./hack/render-homebrew-formula.sh "$VERSION" dist > dist/kekspose.rb
          bash ./hack/render-homebrew-formula.sh "$VERSION" dist "kekspose@${VERSION_NO_V}" > "dist/kekspose@${VERSION_NO_V}.rb"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kekspose
          path: dist/*
      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
